<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ریاضی پایه دهم — دبیرستان دخترانه توانش</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --turquoise: #19b8c2;
      --turquoise-dark: #0c8790;
      --turquoise-light: #e6f8fa;
      --turquoise-lighter: #f0fbfd;
      --text: #0f3d42;
      --shadow-sm: 0 4px 15px rgba(0,0,0,0.08);
      --shadow-md: 0 12px 30px rgba(0,0,0,0.12);
      --shadow-lg: 0 20px 50px rgba(0,0,0,0.18);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Vazirmatn", Tahoma, sans-serif;
      background: linear-gradient(to bottom, var(--turquoise-lighter), #ffffff);
      color: var(--text);
      line-height: 1.6;
      padding: 0;
    }

    .top-actions {
      background: var(--turquoise);
      padding: 16px;
      text-align: center;
      box-shadow: var(--shadow-md);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .top-actions a {
      display: inline-block;
      margin: 0 10px;
      padding: 10px 24px;
      background: white;
      color: var(--turquoise);
      text-decoration: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      transition: var(--transition);
    }

    .top-actions a:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      background: var(--turquoise-light);
    }

    header {
      text-align: center;
      padding: 32px 20px 24px;
      background: var(--turquoise-lighter);
      margin: 20px auto;
      max-width: 900px;
      border-radius: 20px;
      box-shadow: var(--shadow-md);
      border: 2px solid var(--turquoise-light);
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--turquoise-dark);
    }

    header h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-top: 8px;
      color: var(--text);
      opacity: 0.9;
    }

    .lesson-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 28px;
      padding: 0 20px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .video-box {
      flex: 1 1 320px;
      max-width: 420px;
      background: white;
      padding: 24px;
      border-radius: 20px;
      box-shadow: var(--shadow-md);
      border: 2px solid var(--turquoise-light);
      transition: var(--transition);
    }

    .video-box:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: var(--turquoise);
    }

    .video-box h3 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--turquoise-dark);
      margin-bottom: 16px;
      text-align: center;
    }

    video {
      width: 100%;
      border-radius: 16px;
      background: #000;
    }

    .download {
      margin-top: 16px;
      text-align: center;
    }

    .download a {
      display: inline-block;
      padding: 10px 20px;
      background: var(--turquoise);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: var(--transition);
    }

    .download a:hover {
      background: var(--turquoise-dark);
      transform: scale(1.05);
    }

    @media (max-width: 600px) {
      .top-actions a {
        display: block;
        margin: 8px auto;
        max-width: 280px;
      }
      header h1 { font-size: 1.8rem; }
      header h2 { font-size: 1.2rem; }
      .video-box { padding: 20px 16px; }
    }
  </style>
</head>
