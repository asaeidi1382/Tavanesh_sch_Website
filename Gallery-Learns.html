<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>گالری مطالب آموزشی- دبیرستان توانش</title>

  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --turquoise-600: #00bcd4;
      --turquoise-700: #0097a7;
      --turquoise-100: #e0f7fa;
      --turquoise-50:  #f0fcfd;
      --white: #ffffff;
      --ink-900: #0f2f2e;
    }

    body {
      font-family: "Vazirmatn", system-ui, sans-serif;
      background: var(--turquoise-50);
      margin: 0;
      color: var(--ink-900);
    }

    header {
      background: linear-gradient(90deg, var(--turquoise-700), var(--turquoise-600));
      color: var(--white);
      padding: 18px 20px;
      text-align: center;
    }

    .toolbar {
      display: flex; justify-content: center;
      gap: 10px; flex-wrap: wrap;
      padding: 14px 16px;
    }
    .btn {
      background: var(--white);
      color: var(--turquoise-700);
      border: 1px solid rgba(0,188,212,0.35);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all .2s ease;
      font-size: 14px;
    }
    .btn:hover { background: var(--turquoise-100); }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* پیش‌فرض سه ستونه */
      gap: 14px;
      padding: 16px;
      max-width: 1400px;
      margin: 0 auto 40px;
    }

    .card {
      background: var(--white);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(0,188,212,0.25);
      box-shadow: 0 8px 20px rgba(0,188,212,0.12);
      transition: transform .18s ease;
    }
    .card:hover { transform: translateY(-2px); }

    .thumb {
      width: 100%; aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    /* لایت‌باکس */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(10, 35, 34, 0.8);
      display: none;
      align-items: center; justify-content: center;
      z-index: 50;
      padding: 16px;
    }
    .lightbox.open { display: flex; }
    .lightbox-content {
      position: relative;
      max-width: 92vw; max-height: 86vh;
      background: var(--white);
      border-radius: 14px;
      overflow: hidden;
    }
    .lightbox img {
      width: 100%; height: auto;
      max-height: 86vh; object-fit: contain;
      display: block;
    }

    /* دکمه‌های فلش گرد ثابت */
    .icon-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,188,212,0.78);
      color: #fff;
      border: none;
      width: 48px; height: 48px;
      border-radius: 50%;
      cursor: pointer;
      transition: all .2s ease;
      font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .icon-btn:hover,
    .icon-btn:focus {
      background: rgba(0,151,167,0.92);
      outline: 2px solid #fff;
      outline-offset: 2px;
    }
    #prevBtn { left: 16px; }
    #nextBtn { right: 16px; }
    #closeBtn {
      top: 12px; right: 12px;
      transform: none;
      width: 36px; height: 36px;
      font-size: 18px;
      background: rgba(0,188,212,0.9);
    }
  </style>
</head>
<body>

  <header>
    <h1>گالری مطالب آموزشی </h1>
  </header>

  <!-- کنترل تعداد ستون‌ها -->
  <div class="toolbar">
    <button class="btn" id="grid2">دو ستونه</button>
    <button class="btn" id="grid3">سه ستونه</button>
    <button class="btn" id="grid4">چهار ستونه</button>
    <button class="btn" id="grid5">پنج ستونه</button>
    <button class="btn" id="grid6">شش ستونه</button>
  </div>

  <section class="gallery" id="gallery"></section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-content">
      <img id="lightboxImg" alt="تصویر بزرگ شده" />
    </div>
    <button class="icon-btn" id="prevBtn" aria-label="قبلی">◀</button>
    <button class="icon-btn" id="nextBtn" aria-label="بعدی">▶</button>
    <button class="icon-btn" id="closeBtn" aria-label="بستن">✖</button>
  </div>

  <script>
    // مسیر و نام‌گذاری عکسهای عمومی
    const basePath = "images/photos/";
    const startIndex = 1;
    const endIndex = 50; // تعداد تصاویر این گالری را اینجا تنظیم کن

    // نام فایل‌ها با صفرهای پیشرو: Tavanesh-photo-001.jpg
    function pad3(n){ return n.toString().padStart(3, '0'); }
    function fileName(n){ return `Tavanesh-photo-${pad3(n)}.jpg`; }

    const galleryEl = document.getElementById('gallery');
    const items = [];
    for(let i = startIndex; i <= endIndex; i++){
      items.push({ index: i, src: basePath + fileName(i) });
    }

    // ساخت کارت‌ها
    items.forEach((item, idx) => {
      const card = document.createElement('article');
      card.className = 'card';
      const img = document.createElement('img');
      img.className = 'thumb';
      img.src = item.src;
      img.alt = `تصویر ${item.index}`;
      img.addEventListener('click', () => openLightbox(idx));
      img.onerror = () => { card.style.opacity = '0.45'; card.style.filter = 'grayscale(70%)'; };
      card.appendChild(img);
      galleryEl.appendChild(card);
    });

    // لایت‌باکس و ناوبری
    const lightboxEl = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closeBtn = document.getElementById('closeBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let currentIndex = 0;

    function openLightbox(idx){
      currentIndex = idx;
      updateLightbox();
      lightboxEl.classList.add('open');
      nextBtn.focus();
    }
    function closeLightbox(){ lightboxEl.classList.remove('open'); }
    function updateLightbox(){
      const item = items[currentIndex];
      lightboxImg.src = item.src;
    }
    function prev(){
      currentIndex = (currentIndex - 1 + items.length) % items.length;
      updateLightbox();
      prevBtn.focus();
    }
    function next(){
      currentIndex = (currentIndex + 1) % items.length;
      updateLightbox();
      nextBtn.focus();
    }

    // رویدادها
    closeBtn.addEventListener('click', closeLightbox);
    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);

    // کلیک روی پس‌زمینه‌ی لایت‌باکس = بستن
    lightboxEl.addEventListener('click', (e) => {
      if(e.target === lightboxEl) closeLightbox();
    });

    // ناوبری با کیبورد
    window.addEventListener('keydown', (e) => {
      if(!lightboxEl.classList.contains('open')) return;
      if(e.key === 'Escape') closeLightbox();
      if(e.key === 'ArrowLeft') prev();
      if(e.key === 'ArrowRight') next();
    });

    // کنترل تعداد ستون‌ها
    document.getElementById('grid2').addEventListener('click', () => {
      galleryEl.style.gridTemplateColumns = 'repeat(2, 1fr)';
    });
    document.getElementById('grid3').addEventListener('click', () => {
      galleryEl.style.gridTemplateColumns = 'repeat(3, 1fr)';
    });
    document.getElementById('grid4').addEventListener('click', () => {
      galleryEl.style.gridTemplateColumns = 'repeat(4, 1fr)';
    });
    document.getElementById('grid5').addEventListener('click', () => {
      galleryEl.style.gridTemplateColumns = 'repeat(5, 1fr)';
    });
    document.getElementById('grid6').addEventListener('click', () => {
      galleryEl.style.gridTemplateColumns = 'repeat(6, 1fr)';
    });
  </script>
</body>
</html>
