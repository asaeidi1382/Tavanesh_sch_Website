<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title> امتحانات نهایی — دبیرستان دخترانه توانش</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --turquoise: #19b8c2;
      --turquoise-dark: #0c8790;
      --turquoise-light: #e6f8fa;
      --turquoise-lighter: #f0fbfd;
      --text: #0f3d42;
      --shadow-sm: 0 4px 15px rgba(0,0,0,0.08);
      --shadow-md: 0 12px 30px rgba(0,0,0,0.12);
      --shadow-lg: 0 20px 50px rgba(0,0,0,0.18);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Vazirmatn", Tahoma, sans-serif;
      background: linear-gradient(to bottom, var(--turquoise-lighter), #ffffff);
      color: var(--text);
      line-height: 1.6;
      padding: 0;
    }

    .top-actions {
      background: var(--turquoise);
      padding: 16px;
      text-align: center;
      box-shadow: var(--shadow-md);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .top-actions a {
      display: inline-block;
      margin: 0 10px;
      padding: 10px 24px;
      background: white;
      color: var(--turquoise);
      text-decoration: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      transition: var(--transition);
    }

    .top-actions a:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      background: var(--turquoise-light);
    }

    header {
      text-align: center;
      padding: 32px 20px 24px;
      background: var(--turquoise-lighter);
      margin: 20px auto;
      max-width: 900px;
      border-radius: 20px;
      box-shadow: var(--shadow-md);
      border: 2px solid var(--turquoise-light);
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--turquoise-dark);
    }

    header h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-top: 8px;
      color: var(--text);
      opacity: 0.9;
    }

    .coming-soon {
      text-align: center;
      max-width: 700px;
      margin: 40px auto 60px;
      padding: 40px 24px;
      background: white;
      border-radius: 20px;
      box-shadow: var(--shadow-md);
      border: 2px solid var(--turquoise-light);
    }

    .coming-soon h3 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--turquoise-dark);
      margin-bottom: 20px;
    }

    .coming-soon p {
      font-size: 1.2rem;
      line-height: 1.8;
      color: var(--text);
      opacity: 0.85;
    }

    @media (max-width: 600px) {
      .top-actions a {
        display: block;
        margin: 8px auto;
        max-width: 280px;
      }
      header h1 { font-size: 1.8rem; }
      header h2 { font-size: 1.2rem; }
      .coming-soon h3 { font-size: 1.5rem; }
      .coming-soon p { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <div class="top-actions">
    <a href="index.html">🏠 برگشت به صفحه اصلی</a>
    <a href="learning.html">📚 برگشت به محتواهای آموزشی</a>
  </div>

  <header>
    <h1>دبیرستان دخترانه توانش</h1>
    <h2>مجموعه آموزش‌های غیرحضوری — ویژه امتحانات نهایی کلیه پایه ها </h2>
  </header>

  <div class="coming-soon">
    <h3>⏳ محتوا در دست تهیه است</h3>
    <p>ویدیوهای آموزشی مربوطه به‌زودی در این بخش بارگذاری خواهند شد.<br>لطفاً پس از مدتی دوباره بازدید کنید.</p>
  </div>

</body>
</html>
